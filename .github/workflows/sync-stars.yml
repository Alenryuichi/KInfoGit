name: Sync Social Feeds

on:
  schedule:
    # Every day UTC 03:00 (Beijing 11:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install tsx
        run: npm install tsx

      - name: Fetch GitHub stars
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx scripts/fetch-stars.ts

      - name: Fetch Bluesky posts
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx scripts/fetch-bluesky.ts

      - name: Generate daily summaries
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx scripts/generate-summaries.ts

      - name: Generate weekly digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx scripts/generate-weekly-digest.ts

      - name: Generate RSS feed
        run: npx tsx scripts/generate-stars-rss.ts

      - name: Check for changes
        id: check_changes
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync social feeds (stars + bluesky) [skip ci]"
          git push

      - name: Summary
        run: |
          echo "## ⭐ Social Feeds Sync" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ New content fetched and committed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### GitHub Stars" >> $GITHUB_STEP_SUMMARY
            ls -1 profile-data/github-stars/*.json 2>/dev/null | while read f; do
              date=$(basename "$f" .json)
              count=$(grep -c '"repo"' "$f" || echo 0)
              echo "- **${date}**: ${count} repos" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Bluesky Posts" >> $GITHUB_STEP_SUMMARY
            ls -1 profile-data/bluesky-posts/*.json 2>/dev/null | while read f; do
              date=$(basename "$f" .json)
              count=$(grep -c '"uri"' "$f" || echo 0)
              echo "- **${date}**: ${count} posts" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Weekly Digests" >> $GITHUB_STEP_SUMMARY
            ls -1 profile-data/weekly-digests/*.json 2>/dev/null | while read f; do
              week=$(basename "$f" .json)
              echo "- **${week}**: digest generated" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "📭 No new content this week" >> $GITHUB_STEP_SUMMARY
          fi
