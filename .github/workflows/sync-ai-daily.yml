name: Sync AI Daily (Pipeline)

on:
  schedule:
    # Every day UTC 01:00 (Beijing 09:00) — runs 1h after sync-horizon (08:00)
    # so HN community signals from the same day are available for fusion.
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install tsx

      - name: Run AI Daily pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: npx tsx scripts/ai-daily/fetch-ai-daily.ts

      - name: Generate AI Daily weekly digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npx tsx scripts/generate-ai-daily-weekly-digest.ts

      - name: Check for changes
        id: check_changes
        run: |
          git add profile-data/ai-daily/ profile-data/ai-daily-weekly/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "data(ai-daily): automated daily + weekly digest [skip ci]"
          git push

      - name: Summary
        run: |
          echo "## 📰 AI Daily Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ New digest generated and committed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### AI Daily Weeklies" >> $GITHUB_STEP_SUMMARY
            ls -1 profile-data/ai-daily-weekly/*.json 2>/dev/null | tail -4 | while read f; do
              week=$(basename "$f" .json)
              echo "- **${week}**: weekly digest generated" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "📭 No new content today" >> $GITHUB_STEP_SUMMARY
          fi
